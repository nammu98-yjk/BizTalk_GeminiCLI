<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>업무 말투 변환기</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>💼 업무 말투 변환기</h1>
      <p>하고 싶은 말을 편하게 입력하면 AI가 상황에 맞게 바꿔드립니다.</p>
    </div>

    <div class="card-body">
      <!-- 수신 대상 선택 -->
      <div>
        <div class="section-label">받는 사람</div>
        <div class="target-buttons">
          <button class="target-btn" data-target="boss">
            <span class="icon">👔</span>
            상사 / 임원
          </button>
          <button class="target-btn" data-target="colleague">
            <span class="icon">🤝</span>
            타팀 동료
          </button>
          <button class="target-btn" data-target="client">
            <span class="icon">🌐</span>
            고객 / 외부
          </button>
          <button class="target-btn" data-target="team">
            <span class="icon">👥</span>
            팀 내 동료
          </button>
        </div>
      </div>

      <!-- 입력 -->
      <div>
        <div class="section-label">하고 싶은 말</div>
        <textarea
          id="inputText"
          placeholder="예) 내일까지 보고서 제출 어려울 것 같음"
          rows="4"
        ></textarea>
      </div>

      <!-- 에러 메시지 -->
      <div id="errorMsg" class="error-msg"></div>

      <!-- 변환 버튼 -->
      <button id="convertBtn" class="btn-convert">
        <div class="spinner"></div>
        <span class="btn-label">✨ 변환하기</span>
      </button>

      <div class="divider"></div>

      <!-- 결과 -->
      <div id="resultSection" class="result-section">
        <div class="section-label">변환 결과</div>
        <div class="result-box">
          <div id="resultText" class="result-text"></div>
          <button id="copyBtn" class="btn-copy">📋 복사하기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
